<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contact — Booker Comin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="style.css" />
<style>
  .page-hero {
    min-height: 40vh;
    display: flex;
    align-items: flex-end;
    padding: 0 0 60px;
    position: relative;
    overflow: hidden;
  }
  .page-hero::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(79,142,247,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,142,247,0.05) 1px, transparent 1px);
    background-size: 64px 64px;
    mask-image: radial-gradient(ellipse 80% 60% at 50% 50%, black 20%, transparent 80%);
  }
  .page-hero .container { position: relative; z-index: 1; padding-top: 120px; }
  .page-hero .label { margin-bottom: 14px; }
  .page-hero h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(34px,5.5vw,62px);
    font-weight: 800; line-height: 1.05;
    letter-spacing: -2px; color: var(--white); margin-bottom: 16px;
  }
  .page-hero p {
    font-size: 17px; color: var(--text-muted); font-weight: 300; max-width: 480px;
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Booker<span>.</span></a>
  <ul class="nav-links">
    <li><a href="about.html">About</a></li>
    <li><a href="contact.html" class="active">Contact</a></li>
    <li><a href="game.html" class="game-link">👻 Catch Me</a></li>
  </ul>
</nav>

<!-- PAGE HERO -->
<section class="page-hero">
  <div class="container">
    <div class="label reveal">Contact</div>
    <h1 class="reveal d1">Let's Connect</h1>
    <p class="reveal d2">If you want to build something, collaborate, or just talk—reach out.</p>
  </div>
</section>

<div class="divider"></div>

<!-- CONTACT SECTION -->
<section id="contact">
  <div class="container">
    <div class="contact-btns reveal">
      <a href="mailto:bookerjcomin@gmail.com" class="btn-contact primary">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
        Email Me
      </a>
      <a href="https://www.linkedin.com/in/bookercomin/" target="_blank" rel="noopener" class="btn-contact">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-4 0v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
        LinkedIn
      </a>
      <a href="https://www.instagram.com/bookercomin/" target="_blank" rel="noopener" class="btn-contact">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
        Instagram
      </a>
    </div>
  </div>
</section>

<footer>
  <p>© 2025 Booker Comin &nbsp;·&nbsp; Built with intention &nbsp;·&nbsp; <a href="mailto:bookerjcomin@gmail.com">bookerjcomin@gmail.com</a></p>
</footer>

<script>
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: 0.08, rootMargin: '0px 0px -20px 0px' });
  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
  setTimeout(() => {
    document.querySelectorAll('.page-hero .reveal').forEach((el, i) => {
      setTimeout(() => el.classList.add('visible'), 150 + i * 100);
    });
  }, 100);
</script>
</body>
</html>
